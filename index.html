<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GIS Antar Jemput</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#128C7E">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/dexie@4.0.8/dist/dexie.min.js"></script>
</head>
<body x-data x-cloak>
    <header>
        <h1>GIS Antar Jemput</h1>
        <div class="version" style="font-size: 0.7rem; opacity: 0.8;">v1.0.12</div>
    </header>

    <main id="app">
        <div x-show="$store.app.ready === false" class="empty-state">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p>Loading chats...</p>
        </div>

        <div id="view-root" x-show="$store.app.ready">
            <!-- Drivers View (Chats Style) -->
            <template x-if="$store.app.route.name === 'home'">
                <section x-data="{ form: null, editingId: null }">
                    <template x-if="$store.app.activeDrivers().length === 0">
                        <div class="empty-state">
                            <i class="fas fa-users"></i>
                            <p>No active drivers yet.</p>
                        </div>
                    </template>

                    <div style="background: var(--wa-white);">
                        <template x-for="d in $store.app.activeDrivers()" :key="d.id">
                            <article class="list-item" @click="location.hash = '#/drivers/' + d.id">
                                <div class="item-avatar driver">
                                    <i class="fas fa-user"></i>
                                </div>
                                <div class="item-content">
                                    <div class="item-header">
                                        <span class="item-title" x-text="d.name"></span>
                                        <span class="item-right" x-text="formatIDR(d.deposit)" :class="d.deposit < (d.dailyRate * d.lowBalanceThresholdLegs) ? 'badge-low' : 'badge-ok'"></span>
                                    </div>
                                    <div class="item-subtitle">
                                        <span x-text="'Rate: ' + formatIDR(d.dailyRate)"></span>
                                        <i class="fas fa-chevron-right"></i>
                                    </div>
                                </div>
                            </article>
                        </template>
                    </div>

                    <!-- Archived Drivers Toggle -->
                    <div class="mt-4" x-data="{ showArchived: false }" style="text-align: center;">
                        <button class="btn btn-ghost btn-small" @click="showArchived = !showArchived" x-show="$store.app.drivers.some(d => d.archived)">
                            <span x-text="showArchived ? 'Hide Archived' : 'Show Archived'"></span>
                        </button>
                        <div x-show="showArchived" class="mt-2" style="background: var(--wa-white); text-align: left;">
                            <template x-for="d in $store.app.drivers.filter(d => d.archived)" :key="d.id">
                                <article class="list-item" @click="location.hash = '#/drivers/' + d.id">
                                    <div class="item-avatar driver"><i class="fas fa-user-slash"></i></div>
                                    <div class="item-content">
                                        <div class="item-header"><span class="item-title" x-text="d.name"></span></div>
                                        <div class="item-subtitle">Archived</div>
                                    </div>
                                </article>
                            </template>
                        </div>
                    </div>

                    <button class="fab" @click="form = { name: '', dailyRate: 25000, initialDeposit: 0 }; editingId = null">
                        <i class="fas fa-plus"></i>
                    </button>

                    <!-- Add/Edit Driver Modal -->
                    <template x-if="form">
                        <div class="modal-backdrop" x-cloak @click.self="form = null">
                            <div class="modal">
                                <h3 x-text="editingId ? 'Edit Driver' : 'New Driver'"></h3>
                                <label>Name</label>
                                <input x-model="form.name" placeholder="Type a name">
                                <label>Daily Rate (Rp)</label>
                                <input type="number" x-model.number="form.dailyRate">
                                <template x-if="!editingId">
                                    <div>
                                        <label>Initial Deposit (Rp)</label>
                                        <input type="number" x-model.number="form.initialDeposit">
                                    </div>
                                </template>
                                <div class="flex justify-between mt-4">
                                    <button class="btn btn-ghost" @click="form = null">CANCEL</button>
                                    <button class="btn btn-ghost" style="font-weight: 600;" @click="
                                        (async () => {
                                            try {
                                                if (editingId) await $store.app.updateDriver(editingId, form);
                                                else await $store.app.addDriver(form);
                                                form = null;
                                            } catch (e) { alert(e.message); }
                                        })()">SAVE</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </section>
            </template>

            <!-- Kids View -->
            <template x-if="$store.app.route.name === 'kids'">
                <section x-data="{ form: null, editingId: null }">
                    <template x-if="$store.app.kids.length === 0">
                        <div class="empty-state">
                            <i class="fas fa-child"></i>
                            <p>No kids registered yet.</p>
                        </div>
                    </template>

                    <div style="background: var(--wa-white);">
                        <template x-for="k in $store.app.kids" :key="k.id">
                            <article class="list-item" style="flex-wrap: wrap;">
                                <div class="item-avatar kid">
                                    <i class="fas fa-user-graduate"></i>
                                </div>
                                <div class="item-content">
                                    <div class="item-header">
                                        <span class="item-title" x-text="k.name"></span>
                                        <div class="flex gap-2">
                                            <button class="btn btn-ghost btn-small" @click="form = { name: k.name, driverId: k.driverId }; editingId = k.id"><i class="fas fa-pen"></i></button>
                                            <button class="btn btn-ghost btn-small" style="color: var(--wa-danger);" @click="(async () => { if (confirm('Delete ' + k.name + '?')) { try { await $store.app.deleteKid(k.id); } catch(e) { alert(e.message); } } })()"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                    <div class="item-subtitle" x-text="$store.app.driverById(k.driverId)?.name || 'Unassigned'"></div>
                                    
                                    <template x-if="k.driverId">
                                        <div class="flex gap-2 mt-4" style="width: 100%;">
                                            <button class="btn btn-secondary w-full" @click="(async () => { try { await $store.app.logLegFor(k.id, 'pickup'); } catch(e) { alert(e.message); } })()">
                                                <i class="fas fa-sun" style="color: #FFB300;"></i> Pickup
                                            </button>
                                            <button class="btn btn-secondary w-full" @click="(async () => { try { await $store.app.logLegFor(k.id, 'delivery'); } catch(e) { alert(e.message); } })()">
                                                <i class="fas fa-moon" style="color: #5C6BC0;"></i> Delivery
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </article>
                        </template>
                    </div>

                    <button class="fab" @click="form = { name: '', driverId: null }; editingId = null">
                        <i class="fas fa-plus"></i>
                    </button>

                    <!-- Add/Edit Kid Modal -->
                    <template x-if="form">
                        <div class="modal-backdrop" x-cloak @click.self="form = null">
                            <div class="modal">
                                <h3 x-text="editingId ? 'Edit Kid' : 'New Kid'"></h3>
                                <label>Name</label>
                                <input x-model="form.name" placeholder="Kid's name">
                                <label>Assigned Driver</label>
                                <select x-model.number="form.driverId">
                                    <option :value="null">No driver</option>
                                    <template x-for="d in $store.app.activeDrivers()" :key="d.id">
                                        <option :value="d.id" x-text="d.name"></option>
                                    </template>
                                </select>
                                <div class="flex justify-between mt-4">
                                    <button class="btn btn-ghost" @click="form = null">CANCEL</button>
                                    <button class="btn btn-ghost" style="font-weight: 600;" @click="
                                        (async () => {
                                            try {
                                                if (editingId) await $store.app.updateKid(editingId, form);
                                                else await $store.app.addKid(form);
                                                form = null;
                                            } catch (e) { alert(e.message); }
                                        })()">SAVE</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </section>
            </template>

            <!-- Driver Detail View -->
            <template x-if="$store.app.route.name === 'driverDetail'">
                <section x-data="{ tab: 'history', topUpForm: null, editDriver: null }">
                    <template x-if="$store.app.driverDetail">
                        <div class="driver-detail-page">
                            
                            <div class="detail-header-card">
                                <div class="flex items-center gap-2 mb-4">
                                    <button class="btn btn-ghost btn-small" style="padding:0; font-size:1.25rem;" @click="location.hash = '#/'">
                                        <i class="fas fa-arrow-left"></i>
                                    </button>
                                    <div class="item-avatar driver" style="width: 40px; height: 40px; margin:0;"><i class="fas fa-user"></i></div>
                                    <div style="flex:1;">
                                        <h2 x-text="$store.app.driverDetail.driver.name" style="margin:0; font-size: 1.1rem; font-weight: 500;"></h2>
                                        <div class="muted" style="font-size: 0.8rem;" x-text="'Rate: ' + formatIDR($store.app.driverDetail.driver.dailyRate)"></div>
                                    </div>
                                    <button class="btn btn-ghost btn-small" @click="editDriver = { name: $store.app.driverDetail.driver.name, dailyRate: $store.app.driverDetail.driver.dailyRate }">
                                        <i class="fas fa-ellipsis-v"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="deposit-box">
                                <div class="muted">Current Deposit</div>
                                <div class="amount" x-text="formatIDR($store.app.driverDetail.driver.deposit)"></div>
                                <div x-show="$store.app.driverDetail.driver.deposit < ($store.app.driverDetail.driver.dailyRate * $store.app.driverDetail.driver.lowBalanceThresholdLegs)" 
                                     class="badge badge-low mb-2">
                                    <i class="fas fa-exclamation-triangle"></i> Low Balance
                                </div>
                                <div>
                                    <button class="btn btn-primary" @click="topUpForm = { amount: 50000, note: '' }">
                                        <i class="fas fa-wallet"></i> Top up
                                    </button>
                                </div>
                            </div>

                            <div class="wa-tabs">
                                <div class="wa-tab" :class="tab === 'history' ? 'active' : ''" @click="tab = 'history'">History</div>
                                <div class="wa-tab" :class="tab === 'stats' ? 'active' : ''" @click="tab = 'stats'">Summary</div>
                            </div>

                            <div x-show="tab === 'history'" class="history-list">
                                <template x-if="$store.app.driverDetail.history.length === 0">
                                    <div class="empty-state" style="background: var(--wa-bg);">
                                        <p>No transaction history.</p>
                                    </div>
                                </template>
                                <template x-for="h in $store.app.driverDetail.history" :key="h.id + h.kind">
                                    <div class="history-item">
                                        <div>
                                            <div style="font-weight: 500; color: var(--wa-text-main);" x-text="h.kind === 'trip' ? (h.type === 'pickup' ? 'Pickup' : 'Delivery') : 'Top Up'"></div>
                                            <div class="muted" style="font-size: 0.75rem;" x-text="formatDate(h.occurredAt)"></div>
                                            <div class="muted" style="font-size: 0.75rem;" x-text="h.note || (h.kind === 'trip' ? $store.app.kidById(h.kidId)?.name : '')"></div>
                                        </div>
                                        <div style="text-align: right;">
                                            <div :class="h.kind === 'trip' ? 'amount-neg' : 'amount-pos'" x-text="(h.kind === 'trip' ? '−' : '+') + formatIDR(h.amount)"></div>
                                            <button class="btn btn-ghost btn-small" style="padding: 0; margin-top: 0.25rem; font-size: 0.7rem; color: var(--wa-danger);" @click="
                                                (async () => { if (confirm('Undo this transaction?')) {
                                                    try {
                                                        if (h.kind === 'trip') await $store.app.deleteTrip(h.id);
                                                        else await $store.app.deleteTopup(h.id);
                                                        await $store.app.openDriverDetail($store.app.driverDetail.driver.id);
                                                    } catch(e) { alert(e.message); }
                                                } })()">
                                                UNDO
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <div x-show="tab === 'stats'" style="background: var(--wa-bg); padding: 1rem;">
                                <div style="background: var(--wa-white); padding: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1rem; border-radius: 4px; box-shadow: 0 1px 1px rgba(0,0,0,0.05);">
                                    <i class="fas fa-calendar-alt text-teal"></i>
                                    <input type="month" x-model="$store.app.driverDetail.selectedYear + '-' + String($store.app.driverDetail.selectedMonth).padStart(2, '0')" 
                                           @change="(async (e) => { 
                                               const parts = e.target.value.split('-');
                                               if(parts.length === 2) {
                                                   await $store.app.setMonth(parseInt(parts[0]), parseInt(parts[1]));
                                               }
                                           })($event)" style="border:none; margin:0; width:auto; font-weight: 500;">
                                </div>
                                <template x-if="$store.app.driverDetail.monthly">
                                    <div class="stats-grid">
                                        <div class="stat-box">
                                            <div class="label">Trips</div>
                                            <div class="value" x-text="$store.app.driverDetail.monthly.tripsCount"></div>
                                        </div>
                                        <div class="stat-box">
                                            <div class="label">Earnings</div>
                                            <div class="value" x-text="formatIDR($store.app.driverDetail.monthly.tripsAmount)"></div>
                                        </div>
                                        <div class="stat-box">
                                            <div class="label">Top Ups</div>
                                            <div class="value" x-text="formatIDR($store.app.driverDetail.monthly.topupsAmount)"></div>
                                        </div>
                                        <div class="stat-box">
                                            <div class="label">Net Change</div>
                                            <div class="value" :class="$store.app.driverDetail.monthly.topupsAmount - $store.app.driverDetail.monthly.tripsAmount >= 0 ? 'amount-pos' : 'amount-neg'"
                                                 x-text="formatIDR($store.app.driverDetail.monthly.topupsAmount - $store.app.driverDetail.monthly.tripsAmount)"></div>
                                        </div>
                                    </div>
                                </template>
                            </div>

                            <!-- Top up modal -->
                            <template x-if="topUpForm">
                                <div class="modal-backdrop" x-cloak @click.self="topUpForm = null">
                                    <div class="modal">
                                        <h3>Top up</h3>
                                        <label>Amount (Rp)</label>
                                        <input type="number" x-model.number="topUpForm.amount">
                                        <label>Note</label>
                                        <input x-model="topUpForm.note" placeholder="Add a note (optional)">
                                        <div class="flex justify-between mt-4">
                                            <button class="btn btn-ghost" @click="topUpForm = null">CANCEL</button>
                                            <button class="btn btn-ghost" style="font-weight: 600;" @click="
                                                (async () => { try {
                                                    await $store.app.topUpDriver($store.app.driverDetail.driver.id, topUpForm.amount, topUpForm.note);
                                                    topUpForm = null;
                                                } catch (e) { alert(e.message); } })()">SAVE</button>
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <!-- Edit Driver Info Modal -->
                            <template x-if="editDriver">
                                <div class="modal-backdrop" x-cloak @click.self="editDriver = null">
                                    <div class="modal">
                                        <h3>Edit Profile</h3>
                                        <label>Name</label>
                                        <input x-model="editDriver.name">
                                        <label>Daily Rate (Rp)</label>
                                        <input type="number" x-model.number="editDriver.dailyRate">
                                        
                                        <div class="flex justify-between mt-4">
                                            <button class="btn btn-ghost" @click="editDriver = null">CANCEL</button>
                                            <button class="btn btn-ghost" style="font-weight: 600;" @click="
                                                (async () => { try {
                                                    await $store.app.updateDriver($store.app.driverDetail.driver.id, editDriver);
                                                    editDriver = null;
                                                } catch (e) { alert(e.message); } })()">SAVE</button>
                                        </div>
                                        <div class="mt-4" style="text-align: center;">
                                            <button class="btn btn-danger" @click="
                                                (async () => { if (confirm('Archive this driver? They will no longer appear in active lists.')) {
                                                    try {
                                                        await $store.app.archiveDriver($store.app.driverDetail.driver.id);
                                                        editDriver = null;
                                                        $store.app.route = { name: 'home', params: {} };
                                                    } catch(e) { alert(e.message); }
                                                } })()">Archive Driver</button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </section>
            </template>
        </div>
    </main>

    <!-- Navigation Tab Bar -->
    <nav id="tabbar" x-show="$store.app.ready">
        <a href="#/" class="tab-item" :class="['home', 'driverDetail'].includes($store.app.route.name) ? 'active' : ''">
            <i class="fas fa-comment-dots"></i>
            <span>Drivers</span>
        </a>
        <a href="#/kids" class="tab-item" :class="$store.app.route.name === 'kids' ? 'active' : ''">
            <i class="fas fa-users"></i>
            <span>Kids</span>
        </a>
        <a href="#" class="tab-item" @click.prevent="location.reload()">
            <i class="fas fa-sync"></i>
            <span>Refresh</span>
        </a>
    </nav>

    <!-- Toast Notification -->
    <div id="toast-root" x-show="$store.toast.visible" x-cloak class="toast">
        <span x-text="$store.toast.message"></span>
    </div>

    <!-- PWA Install Banner -->
    <div id="install-banner" class="install-banner" style="display: none; position: fixed; bottom: 5rem; left: 1rem; right: 1rem; background: var(--wa-white); padding: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; z-index: 100; justify-content: space-between; align-items: center;">
        <span style="font-size: 0.875rem;">Install App for best experience</span>
        <button class="btn btn-primary btn-small">Install</button>
    </div>

    <script type="module" src="js/app.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</body>
</html>
